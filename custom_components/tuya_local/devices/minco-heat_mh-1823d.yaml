name: MH-1823D Thermostat with external sensor (C)
primary_entity:
  entity: climate
  dps:
    - id: 3
      type: boolean
      name: power
      mapping:
        - dps_val: true
          value: "start"
        - dps_val: false
          value: "stop"
    - id: 22
      type: integer
      name: target_temperature
    - id: 33
      type: float
      name: current_temperature
